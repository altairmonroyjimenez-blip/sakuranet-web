<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SakuraNet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary">
    <div class="container">

        <a class="navbar-brand" href="{{ url_for('inicio') }}">
            <img src="{{ url_for('static', filename='img/logo2.0.png') }}"
                  alt="SakuraNet Logo"
                  class="logo-nav">
        </a>




        <button class="navbar-toggler" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#navbarSakura" 
                aria-controls="navbarSakura" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSakura">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Internet</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Streaming</a></li>
            </ul>

            <a class="btn btn-outline-light" href="#">Administrador</a>
        </div>

    </div>
</nav>


    <!-- CONTENIDO -->
    <main class="py-5">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-black text-secondary py-4 mt-5">
        <div class="container d-flex flex-column flex-md-row justify-content-between">
            <div>
                <h5 class="text-light">SakuraNet</h5>
                <p>Tu conexión al mejor servicio de Internet.</p>
            </div>

            <div>
                <p>Contacto: soporte@sakuranet.mx</p>
                <p>Tel: 55-0000-0000</p>
            </div>

            <div>
                <p>© 2026 SakuraNet. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
