{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="p-4 panel-admin-card" style="max-width: 380px; width: 100%;">
        <h3 class="text-center mb-4" style="color:#7C3AED;">Panel Administrador</h3>

        {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                {% for categoria, mensaje in mensajes %}
                    <div class="alert alert-{{ categoria }}">{{ mensaje }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label" for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" class="form-control neon-input" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control neon-input" required>
            </div>
            <button type="submit" class="btn-mes w-100">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
